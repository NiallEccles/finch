<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finch</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav>
      <div class="nav-header">
        <h1>Finch</h1>
        <div class="nav-header-trailing">
          <button>
            <img src="./assets/icons/bell-outline.svg" alt="notifications" />
          </button>
          <button id="settings">
            <img src="./assets/icons/settings-outline.svg" alt="settings" />
          </button>
        </div>
      </div>
      <div class="nav-content">
        <div class="nav-content-header">
          <h2>Todo</h2>
          <button>
            <img src="./assets/icons/plus-circle-outline.svg" alt="create" />
          </button>
        </div>
      </div>
    </nav>

    <div id="overlay">
      <div class="overlay-content">
        <div class="overlay-header">
          <h3>Settings</h3>
          <button id="close">
            <img src="./assets//icons/close-outline.svg" alt="close" />
          </button>
        </div>
        <ul>
          <li>
            <span>Notifications</span>
            <label class="switch">
              <input class="toggle" type="checkbox" />
              <span class="slider round"></span>
            </label>
          </li>
        </ul>
      </div>
    </div>
  </body>
  <script src="scripts/index.js"></script>
</html>
